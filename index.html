<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="only light">
    <meta name="monetag" content="%VITE_MONETAG_ID%">
    <title>MKI Links PRO</title>
    <style>
      .mki-app .only-web { display: none; }
      .mki-app .only-app { display: block; }
    </style>
    <script>
      (function () {
        const STATE = {
          isApp: false,
          verified: false,
          app: null,
          platform: null,
          version: null,
          nonce: null,
          lastError: null,
        };

        // expõe para debug
        window.__MKI_APP_ENV__ = STATE;

        function markVerified(info) {
          STATE.isApp = true;
          STATE.verified = true;
          STATE.app = info.app || "MKI";
          STATE.platform = info.platform || "android";
          STATE.version = info.version || "unknown";
          STATE.nonce = info.nonce || null;

          document.documentElement.classList.add("mki-app");
          document.documentElement.setAttribute("data-mki-app", "true");
          document.documentElement.setAttribute("data-mki-platform", STATE.platform);
          document.documentElement.setAttribute("data-mki-version", STATE.version);

          window.dispatchEvent(new CustomEvent("mki:app-ready", { detail: { ...STATE } }));
        }

        function safeJsonParse(str) {
          try { return JSON.parse(str); } catch { return null; }
        }

        // IMPORTANTE: Em WebView/Sketchware, chamadas geralmente são SÍNCRONAS
        function callBridge(fnName, ...args) {
          const b = window.MKI_APP;
          if (!b) return null;
          const fn = b[fnName];
          if (typeof fn !== "function") return null;

          try {
            const res = fn.apply(b, args);
            // res pode ser string JSON
            return res;
          } catch (e) {
            STATE.lastError = String(e);
            return null;
          }
        }

        function tryHandshakeOnce() {
          const bridge = window.MKI_APP;
          if (!bridge) return false;

          const helloStr = callBridge("getHello");
          if (!helloStr) return false;

          const hello = safeJsonParse(helloStr);
          if (!hello || hello.app !== "MKI" || hello.platform !== "android" || !hello.nonce) return false;

          const challenge = "mki-" + Date.now() + "-" + Math.random().toString(16).slice(2);
          const signedStr = callBridge("signChallenge", challenge);
          if (!signedStr) return false;

          const signed = safeJsonParse(signedStr);
          if (!signed) return false;

          // validação prática
          if (signed.challenge !== challenge) return false;
          if (signed.nonce !== hello.nonce) return false;

          markVerified(hello);
          return true;
        }

        // Faz polling curto (resolve timing/SPA)
        function runHandshakeWithRetry() {
          let tries = 0;
          const maxTries = 80; // ~8s (80 * 100ms)

          const timer = setInterval(() => {
            tries++;

            if (STATE.verified) {
              clearInterval(timer);
              return;
            }

            const ok = tryHandshakeOnce();
            if (ok || tries >= maxTries) {
              clearInterval(timer);
            }
          }, 100);
        }

        // 1) primeira tentativa
        runHandshakeWithRetry();

        // 2) SPA: tenta também após mudanças de rota
        const _pushState = history.pushState;
        history.pushState = function () {
          const ret = _pushState.apply(this, arguments);
          setTimeout(runHandshakeWithRetry, 50);
          return ret;
        };

        window.addEventListener("popstate", () => setTimeout(runHandshakeWithRetry, 50));
        window.addEventListener("hashchange", () => setTimeout(runHandshakeWithRetry, 50));
      })();
    </script>

    <script>
      window.addEventListener("mki:app-ready", (e) => {
        // Mostra na hora que detectou
        alert("✅ MKI APP DETECTADO\n" + JSON.stringify(e.detail, null, 2));
      });
    </script>
  </head>
  <body>
    <noscript><img src="https://my.rtmark.net/img.gif?f=sync&lr=1&partner=%VITE_RTMARK_PARTNER_ID%" width="1" height="1" /></noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
